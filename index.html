<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación - La Granja de Sebastián</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Quicksand:wght@400;500;600&display=swap');

    body {
        font-family: 'Quicksand', sans-serif;
        background: #f5f1e8;
        color: #3e2723;
        margin: 0;
        padding: 20px;
        text-align: center;
    }

    .container {
        max-width: 700px;
        margin: 0 auto;
    }

    .banner-img {
        max-width: 600px;
        width: 100%;
        border: 8px solid #fff;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        margin-bottom: 30px;
        border-radius: 4px;
    }

    h1 {
        font-family: 'Amatic SC', cursive;
        font-size: 56px;
        font-weight: 700;
        color: #5d4037;
        margin: 15px 0 5px;
        letter-spacing: 2px;
    }

    .subtitle {
        font-size: 16px;
        font-weight: 500;
        color: #8d6e63;
        margin-bottom: 40px;
    }

    form {
        max-width: 500px;
        margin: 0 auto;
        text-align: left;
        background: white;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    label {
        font-size: 15px;
        font-weight: 600;
        color: #5d4037;
        margin-bottom: 8px;
        display: block;
    }

    input, select, textarea {
        width: 100%;
        padding: 14px;
        margin-bottom: 22px;
        border: 2px solid #d7ccc8;
        border-radius: 6px;
        font-family: 'Quicksand', sans-serif;
        font-size: 16px;
        background: #fff;
        box-sizing: border-box;
        transition: 0.2s;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #8d6e63;
        box-shadow: 0 0 0 3px rgba(141,110,99,0.1);
    }

    button {
        width: 100%;
        padding: 16px;
        background: #6d4c41;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-family: 'Amatic SC', cursive;
        font-size: 28px;
        letter-spacing: 2px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    button:hover {
        background: #5d4037;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(93,64,55,0.3);
    }

    @media (max-width: 600px) {
        h1 {
            font-size: 48px;
        }
        form {
            padding: 25px;
        }
        body {
            padding: 15px;
        }
    }
    </style>
</head>
<body>
    <div class="container">
        <img src="invitacion.JPG" alt="Invitación Sebastian Granja" class="banner-img">
        
        <h1>La Granja de Sebastián</h1>
        <p class="subtitle">ACOMPAÑANOS A CELEBRAR</p>

        <form action="https://formsubmit.co/santibalderas@hotmail.com" method="POST">
            <input type="hidden" name="_next" value="https://lagranjadesebastian.github.io/Lagranjadesebastian/gracias.html">
            <input type="hidden" name="_captcha" value="false">
            
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" required>

            <label for="asistencia">¿Confirmas tu asistencia?</label>
            <select id="asistencia" name="asistencia" required>
                <option value="">Selecciona una opción</option>
                <option value="Si asistiré">Sí, ahí estaré</option>
                <option value="No podré asistir">No podré asistir</option>
            </select>

            <label for="invitados">Número de acompañantes</label>
            <select id="invitados" name="invitados" required>
                <option value="">Selecciona</option>
                <option value="0">Solo yo</option>
                <option value="1">1 persona</option>
                <option value="2">2 personas</option>
                <option value="3">3 personas</option>
                <option value="4">4 personas</option>
            </select>

            <label for="mensaje">Mensaje para Sebastián</label>
            <textarea id="mensaje" name="mensaje" rows="4" placeholder="Déjale tus buenos deseos..."></textarea>

            <button type="submit">Confirmar Asistencia</button>
        </form>
    </div>
</body>
</html>
