<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebastian - Mi Bautizo y Cumpleaños</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Boogaloo&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #8d6e63 url('https://www.transparenttextures.com/patterns/dark-wood.png');
            padding: 15px; color: #3e2723;
        }
        .container {
            max-width: 650px; margin: 0 auto; background: #fdf6e3;
            border-radius: 8px; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 10px solid #a52a2a;
        }
        .banner-link { display: block; line-height: 0; }
        .banner-img { width: 100%; height: auto; display: block; cursor: pointer; }
        .content {
            padding: 30px 20px;
            background: #fdf6e3 url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            text-align: center;
        }
        .titulo-principal {
            font-family: 'Luckiest Guy', cursive; color: #c41e1e; font-size: 3.5em;
            letter-spacing: 2px; margin: 15px 0; line-height: 1;
            text-shadow: -3px -3px 0 #f9a825, 3px -3px 0 #f9a825, -3px 3px 0 #f9a825, 3px 3px 0 #f9a825, 5px 0px #5d1a1a;
            text-transform: uppercase;
        }
        .subtitulo-evento {
            font-family: 'Luckiest Guy', cursive; color: #5d4037; font-size: 1.5em;
            margin-bottom: 20px; letter-spacing: 1px; display: flex;
            align-items: center; justify-content: center; gap: 10px; flex-wrap: nowrap;
            text-transform: uppercase;
        }
        .subtitulo-evento .estrellas { color: #f9a825; font-size: 0.8em; letter-spacing: 4px; flex-shrink: 0; }
        .animalitos { font-size: 1.2em; letter-spacing: 8px; margin: 15px 0; display: block; }
        .divisor { height: 4px; background: repeating-linear-gradient(90deg, #a52a2a, #a52a2a 10px, #f9a825 10px, #f9a825 20px); margin: 25px 0; }
        .evento-box {
            background: #fff; padding: 25px; border: 4px solid #795548;
            border-radius: 5px; margin: 20px 0;
            box-shadow: inset 0 0 15px rgba(121, 85, 72, 0.2); text-align: left;
        }
        .evento-box h3 { 
            font-family: 'Luckiest Guy', cursive; color: #a52a2a; 
            font-size: 1.8em; margin-bottom: 15px; text-align: center; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .evento-box p { margin: 12px 0; font-size: 1.15em; font-weight: 600; line-height: 1.5; }
        .evento-box strong { color: #5d4037; font-weight: 700; }
        .aviso-traje {
            background: #fff3cd; border: 3px dashed #a52a2a; padding: 15px;
            margin: 25px 0 10px 0; border-radius: 8px; font-family: 'Luckiest Guy', cursive;
            color: #8b0000; font-size: 1.4em; font-weight: 400; text-align: center; text-transform: uppercase;
            letter-spacing: 1px;
        }
        form { text-align: left; }
        label { 
            display: block; margin-top: 20px; font-weight: 400; color: #4e342e; 
            font-size: 1.3em; font-family: 'Boogaloo', cursive; 
            text-align: center; text-transform: uppercase; letter-spacing: 1px;
        }
        input, select, textarea {
            width: 100%; padding: 14px; margin-top: 8px; border: 3px solid #a1887f;
            border-radius: 5px; background: #fffef7; font-family: Georgia, serif;
            font-size: 1em; font-weight: 600; text-align: center;
        }
        input:focus, select:focus, textarea:focus { border-color: #a52a2a; outline: none; background: #fff; }
        button {
            background: #a52a2a; color: #fff8e1; padding: 16px; border: 4px solid #4e342e;
            border-radius: 8px; font-size: 1.6em; cursor: pointer; width: 100%;
            margin-top: 30px; font-family: 'Luckiest Guy', cursive; text-transform: uppercase;
            letter-spacing: 3px; box-shadow: 0 5px 0 #4e342e; transition: all 0.1s;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #4e342e; }
        .footer-granja {
            text-align: center; margin-top: 30px; padding-top: 20px;
            border-top: 4px dashed #a1887f; font-family: 'Boogaloo', cursive;
            color: #6d4c41; font-size: 1.5em; text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="#formulario" class="banner-link">
            <img src="invitacion.JPG" alt="Invitación Sebastian Granja" class="banner-img">
        </a>
        
        <div class="content">
            <h1 class="titulo-principal">SEBASTIAN</h1>
            <div class="subtitulo-evento">
                <span class="estrellas">★★</span>
                MI CUMPLEAÑOS Y BAUTIZO
                <span class="estrellas">★★</span>
            </div>
            
            <div class="animalitos">🐄 🐖 🐑 🐴</div>
            <div class="divisor"></div>
            
            <div class="evento-box">
                <h3>Los esperamos en la granja</h3>
                <p><strong>Fecha:</strong> Sábado 04 de Julio</p>
                <p><strong>Misa:</strong> 4:00 pm en Santuario de Guadalupe</p>
                <p><strong>Recepción:</strong> 6:00 pm <br>
                Quinta Isla Mujeres<br>
                Ayuntamiento #208 A, Ejido Piedras Negras</p>
            </div>

            <form id="formulario" action="https://formsubmit.co/santibalderas@hotmail.com" method="POST">
                <label for="nombre">Nombre del Invitado:</label>
                <input type="text" id="nombre" name="nombre" required>

                <label for="asistencia">¿Confirmas tu asistencia?</label>
                <select id="asistencia" name="asistencia" required>
                    <option value="">Selecciona una opción</option>
                    <option value="Sí asistiré">Sí, ahí estaré</option>
                    <option value="No podré asistir">No podré asistir</option>
                </select>

                <label for="evento">¿A cuál evento asistes?</label>
                <select id="evento" name="evento" required>
                    <option value="">Selecciona una opción</option>
                    <option value="Misa y Recepción">Misa y Recepción</option>
                    <option value="Solo Misa">Solo Misa</option>
                    <option value="Solo Recepción">Solo Recepción</option>
                </select>

                <label for="mensaje">Mensaje para Sebastian:</label>
                <textarea id="mensaje" name="mensaje" rows="3" placeholder="Felicidades por tu bautizo..."></textarea>

                <input type="hidden" name="_subject" value="Nueva confirmación - Bautizo Sebastian">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="https://lagranjadesebastian.github.io/Lagranjadesebastian/gracias.html">
                
                <button type="submit">Confirmar</button>
            </form>
            
            <p class="footer-granja">Gracias por acompañarnos</p>
            <div class="aviso-traje">(NO OLVIDES TU TRAJE DE BAÑO)</div>
        </div>
    </div>
</body>
</html>
