<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación - La Granja de Sebastián</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    body {
        font-family: 'Poppins', sans-serif;
        background: #fafafa;
        color: #1a1a1a;
        margin: 0;
        padding: 20px;
        text-align: center;
    }

    .container {
        max-width: 700px;
        margin: 0 auto;
    }

    .banner-img {
        max-width: 600px;
        width: 100%;
        border-radius: 12px;
        margin-bottom: 40px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    h1 {
        font-size: 36px;
        font-weight: 700;
        margin: 10px 0;
        color: #1a1a1a;
        letter-spacing: -0.5px;
    }

    .subtitle {
        font-size: 15px;
        font-weight: 300;
        color: #4a9c4a;
        margin-bottom: 50px;
        letter-spacing: 1px;
    }

    form {
        max-width: 480px;
        margin: 0 auto 30px;
        background: white;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        text-align: left;
    }

    label {
        font-size: 14px;
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
        display: block;
    }

    input, select, textarea {
        width: 100%;
        padding: 12px 16px;
        margin-bottom: 24px;
        border: 2px solid #eee;
        border-radius: 8px;
        font-family: 'Poppins', sans-serif;
        font-size: 15px;
        transition: 0.2s;
        box-sizing: border-box;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #4a9c4a;
        box-shadow: 0 0 0 3px rgba(74,156,74,0.1);
    }

    button {
        width: 100%;
        padding: 15px;
        background: #4a9c4a;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        margin-top: 8px;
    }

    button:hover {
        background: #3d823d;
        transform: scale(1.02);
        box-shadow: 0 4px 12px rgba(74,156,74,0.25);
    }

    .footer-note {
        font-size: 14px;
        color: #666;
        line-height: 1.8;
        max-width: 480px;
        margin: 0 auto;
    }

    .footer-note strong {
        color: #4a9c4a;
        font-weight: 600;
    }

    @media (max-width: 600px) {
        h1 {
            font-size: 30px;
        }
        form {
            padding: 30px 25px;
        }
        body {
            padding: 15px;
        }
        .subtitle {
            margin-bottom: 35px;
        }
    }
    </style>
</head>
<body>
    <div class="container">
        <img src="invitacion.JPG" alt="Invitación Sebastian Granja" class="banner-img">
        
        <h1>La Granja de Sebastián</h1>
        <p class="subtitle">ACOMPAÑANOS A CELEBRAR</p>

        <form action="https://formsubmit.co/santibalderas@hotmail.com" method="POST">
            <input type="hidden" name="_next" value="https://lagranjadesebastian.github.io/Lagranjadesebastian/gracias.html">
            <input type="hidden" name="_captcha" value="false">
            
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="Nombre" required>

            <label for="asistencia">Asistencia</label>
            <select id="asistencia" name="Asistencia" required>
                <option value="">Selecciona una opción</option>
                <option value="Sí asistiré">Sí asistiré</option>
                <option value="No podré asistir">No podré asistir</option>
            </select>

            <label for="evento">Evento</label>
            <select id="evento" name="Evento" required>
                <option value="">Selecciona a qué asistirás</option>
                <option value="Misa">Misa</option>
                <option value="Recepción">Recepción</option>
                <option value="Misa y Recepción">Misa y Recepción</option>
            </select>

            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" name="Mensaje" rows="4" placeholder="Déjale tus buenos deseos..."></textarea>

            <button type="submit">Confirmar Asistencia</button>
        </form>

        <div class="footer-note">
            <p>Gracias por acompañarnos</p>
            <p><strong>Por último: No olvides tu traje de baño</strong></p>
        </div>
    </div>
</body>
</html>
