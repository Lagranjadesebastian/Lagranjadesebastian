<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirma tu asistencia - Sebastian</title>
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Raleway', sans-serif;
            background: #dcedc8 url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            padding: 20px;
            color: #3e2723;
        }
        .form-container {
            max-width: 600px;
            margin: 20px auto;
            background: #fffef7;
            padding: 0 0 35px 0;
            border-radius: 15px;
            border: 8px solid #8d6e63;
            box-shadow: 0 0 0 4px #a5d6a7, 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 6px solid #8d6e63;
        }
        .content {
            padding: 25px 35px 0 35px;
        }
        h1 {
            font-family: 'Rye', cursive;
            color: #d32f2f;
            text-align: center;
            font-size: 2.8em;
            margin: 15px 0 5px 0;
            text-shadow: 2px 2px 0px #ffcc80;
        }
        .subtitle {
            text-align: center;
            font-family: 'Rye', cursive;
            color: #5d4037;
            font-size: 1.4em;
            margin-bottom: 20px;
        }
        .animales {
            text-align: center;
            font-size: 2.2em;
            margin: 15px 0;
            letter-spacing: 10px;
        }
        .evento {
            background: #f1f8e9;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border: 3px solid #a5d6a7;
            position: relative;
        }
        .evento::before {
            content: '🚜';
            position: absolute;
            top: -18px;
            left: 15px;
            font-size: 30px;
            background: #fffef7;
            padding: 0 5px;
        }
        .evento p { margin: 10px 0; font-size: 1.1em; }
        .evento strong { color: #388e3c; }
